app = "homio"
primary_region = "fra"

kill_signal = "SIGINT"
kill_timeout = 5

[build]
dockerfile = "Dockerfile"

[env]
NODE_ENV = "production"
PORT = "3000"

[[services]]
internal_port = 3000
processes = ["app"]
protocol = "tcp"

[services.concurrency]
hard_limit = 25
soft_limit = 20
type = "requests"

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 8443
handlers = ["tls", "http"]

[[services.tcp_checks]]
interval = "10s"
timeout = "2s"
grace_period = "10s"
